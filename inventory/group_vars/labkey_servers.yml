---
# =============================================================================
# JDK
# Výchozí: JDK 17 (pro LabKey ≤ 25.11). Pro LabKey > 25.11 se automaticky
# použije JDK 25 — install.yml ho stáhne z internetu (jdk25_url).
# =============================================================================
jdk_archive: "OpenJDK17U-jdk_x64_linux_hotspot_17.0.18_8.tar.gz"
jdk_dir:     "jdk-17.0.18+8"                 # adresář uvnitř archivu

# JDK 25 (Temurin) — použije se automaticky pokud labkey_version > 25.11
# Tarball stáhnout předem z https://adoptium.net a uložit do files/
jdk25_archive: "OpenJDK25U-jdk_x64_linux_hotspot_25.0.2_10.tar.gz"
jdk25_dir:     "jdk-25.0.2+10"

# =============================================================================
# LabKey verze — odkomentovat požadovanou verzi, ostatní zakomentovat
# Příslušný tarball musí být uložen v files/
# =============================================================================

# --- LabKey 24.7 (embedded) ---
# labkey_archive:  "LabKey24.7.0-1-community-embedded.tar.gz"
# labkey_dist_dir: "LabKey24.7.0-1-community"

# --- LabKey 24.11 ---
# labkey_archive:  "LabKey24.11.1-3-community.tar.gz"
# labkey_dist_dir: "LabKey24.11.1-3-community"

# --- LabKey 25.11 (aktuální) ---
labkey_archive:  "LabKey25.11.0-1-community.tar.gz"
labkey_dist_dir: "LabKey25.11.0-1-community"

# =============================================================================
# Adresářová struktura na cílovém serveru
# =============================================================================
labkey_root:        "/labkey"
labkey_home:        "/labkey/labkey"
labkey_src:         "/labkey/src"
labkey_apps:        "/labkey/apps"
labkey_backup:      "/labkey/backupArchive"
labkey_admin:       "/labkey/admin"

labkey_system_user: "labkeysvc"   # "labkey" koliduje s AD doménovým účtem labkey@fno.cz

# =============================================================================
# PostgreSQL
# =============================================================================
labkey_db_name: "labkey"
labkey_db_user: "labkey"
labkey_db_pass: "labkey"             # TESTOVACÍ heslo — před ostrým nasazením změnit!

pg_data_dir: "/usr/local/pgsql/data"

# =============================================================================
# LabKey konfigurace (application.properties)
# =============================================================================
labkey_encryption_key: "changeme32charslongkey12345678"  # přesně 32 znaků

# Veřejná URL serveru — nutné pro správné generování odkazů v emailech
labkey_base_server_url: "https://{{ labkey_hostname }}"

# Branding
labkey_company_name:      ""   # např. "FN Ostrava" (prázdné = LabKey výchozí)
labkey_system_short_name: ""   # např. "SDMS" (prázdné = LabKey výchozí)
labkey_system_email:      ""   # odesílací adresa systémových emailů

# =============================================================================
# SMTP (odchozí pošta)
# =============================================================================
labkey_smtp_host:     ""       # např. "smtp.fno.cz"
labkey_smtp_port:     "25"
labkey_smtp_from:     ""       # např. "labkey@fno.cz"
labkey_smtp_user:     ""       # prázdné = bez autentizace
labkey_smtp_password: ""
labkey_smtp_auth:     "FALSE"
labkey_smtp_starttls: "FALSE"

# =============================================================================
# JVM paměť
# Prázdné hodnoty = automatický výpočet z dostupné RAM (doporučeno):
#   RAM > 8 GB → Xmx = 75 % RAM,  jinak Xmx = 50 % RAM
#   Xms = 50 % Xmx
# Chcete-li přepsat ručně, zadejte hodnoty např. "2G" / "4G".
# =============================================================================
labkey_jvm_min_heap: ""
labkey_jvm_max_heap: ""

# =============================================================================
# R / RStudio Server
# =============================================================================
rstudio_deb: "rstudio-server-2024.09.1-394-amd64.deb"   # soubor uložit do files/

# =============================================================================
# Oracle Instant Client
# Soubory uložit do files/
# =============================================================================
oracle_client_dir:           "/opt/oracle"
oracle_instant_client_dir:   "instantclient_23_26"       # adresář po rozbalení
oracle_basic_zip:  "instantclient-basic-linux.x64-23.26.1.0.0.zip"

# =============================================================================
# Nginx / SSL
# labkey_hostname, ssl_cert_file, ssl_key_file jsou definovány per-host
# v inventory/host_vars/<hostname>.yml
# =============================================================================
labkey_port:     8080                      # interní HTTP port LabKey

# =============================================================================
# Dagu workflow scheduler
# Archiv uložit předem do files/. Playbook playbooks/dagu.yml instaluje Dagu
# primárně na labkey-dev, kde běží pod stejným servisním účtem jako LabKey.
# =============================================================================
dagu_version: "2.7.7"
dagu_archive: "dagu_2.7.7_linux_amd64.tar.gz"
dagu_install_dir: "{{ labkey_apps }}/dagu-{{ dagu_version }}"
dagu_bin: "/usr/local/bin/dagu"

dagu_user: "{{ labkey_system_user }}"
dagu_group: "{{ labkey_system_user }}"
dagu_home: "{{ labkey_root }}/dagu"
dagu_dags_dir: "{{ dagu_home }}/dags"
dagu_log_dir: "{{ dagu_home }}/logs"

dagu_host: "127.0.0.1"
dagu_port: 8090
dagu_base_path: "/workflows"
dagu_api_base_path: "/api/v1"
dagu_public_url: "https://{{ labkey_hostname }}{{ dagu_base_path }}"
dagu_default_shell: "/bin/bash"

dagu_auth_username: "admin"
dagu_auth_password: "ZMEN_ME_min8znaku"   # pro reálné použití přepsat per-host nebo přes vault

dagu_smtp_host: "smtp.fno.cz"
dagu_smtp_port: "25"
dagu_smtp_user: ""
dagu_smtp_password: ""

dagu_mail_on_failure: true
dagu_mail_on_success: false
dagu_error_mail_from: "dagu@{{ labkey_hostname }}"
dagu_error_mail_to: "lstefek@fno.cz"
dagu_error_mail_prefix: "[DAGU-FAIL]"
dagu_error_mail_attach_logs: true

# Pokud je na serveru už nasazen nginx vhost z ssl.yml, dagu.yml ho rozšíří
# o reverse proxy na {{ dagu_base_path }}.
dagu_nginx_enabled: true
