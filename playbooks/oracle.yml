---
# =============================================================================
# Oracle Instant Client
#
# Předpoklady — soubory uložit do files/:
#   {{ oracle_basic_zip }}   — Oracle Instant Client Basic
#
# Stažení z: https://www.oracle.com/database/technologies/instant-client/linux-x86-64-downloads.html
#
# Spuštění: ansible-playbook playbooks/oracle.yml
# =============================================================================
- name: Oracle Instant Client
  hosts: labkey_servers
  become: true

  vars:
    oracle_ic_path: "{{ oracle_client_dir }}/{{ oracle_instant_client_dir }}"

  tasks:

  # ===========================================================================
  # 1. Systémové závislosti
  # ===========================================================================

    - name: "Oracle | Instalace systémových závislostí"
      apt:
        name:
          - libaio1
          - unzip
        state: present
        update_cache: true

  # ===========================================================================
  # 2. Oracle Instant Client
  # ===========================================================================

    - name: "Oracle | Vytvoření adresáře {{ oracle_client_dir }}"
      file:
        path: "{{ oracle_client_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Oracle | Zkopírování Oracle Basic zip na server"
      copy:
        src: "../files/{{ oracle_basic_zip }}"
        dest: "/tmp/{{ oracle_basic_zip }}"
        mode: "0644"

    - name: "Oracle | Rozbalení Oracle Basic"
      unarchive:
        src: "/tmp/{{ oracle_basic_zip }}"
        dest: "{{ oracle_client_dir }}"
        remote_src: true
        creates: "{{ oracle_ic_path }}"

    - name: "Oracle | Smazání dočasného zip souboru"
      file:
        path: "/tmp/{{ oracle_basic_zip }}"
        state: absent

    - name: "Oracle | Konfigurace dynamického linkeru (ld.so.conf)"
      copy:
        content: "{{ oracle_ic_path }}\n"
        dest: /etc/ld.so.conf.d/oracle-instantclient.conf
        mode: "0644"

    - name: "Oracle | Aktualizace cache dynamického linkeru"
      command: ldconfig

    - name: "Oracle | Nastavení proměnných prostředí v /etc/profile.d/"
      copy:
        dest: /etc/profile.d/oracle_client.sh
        mode: "0644"
        content: |
          # Oracle Instant Client
          export ORACLE_HOME={{ oracle_ic_path }}
          export LD_LIBRARY_PATH={{ oracle_ic_path }}:$LD_LIBRARY_PATH
          export PATH=$PATH:{{ oracle_ic_path }}
