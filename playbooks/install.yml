---
# =============================================================================
# LabKey Server v24 — plná instalace na Debian
# Spuštění: ansible-playbook playbooks/install.yml
# =============================================================================
- name: Instalace LabKey Server v24
  hosts: labkey_servers
  become: true

  vars:
    labkey_dist: "{{ labkey_src }}/{{ labkey_dist_dir }}"

  # ===========================================================================
  # 1. APT balíčky
  # ===========================================================================
  tasks:

    - name: "APT | Aktualizace cache"
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "APT | Instalace závislostí"
      apt:
        name:
          - postgresql
          - r-base
          - r-base-dev
          - r-recommended
          - tex-common
          - texinfo
          - uuid-runtime
          - util-linux
          - wget
          - gpg
          - apt-transport-https
        state: present

  # ===========================================================================
  # 2. Adresářová struktura
  # ===========================================================================

    - name: "Adresáře | Vytvoření adresářové struktury LabKey"
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ labkey_root }}"
        - "{{ labkey_home }}"
        - "{{ labkey_home }}/labkey-tmp"
        - "{{ labkey_src }}"
        - "{{ labkey_apps }}"
        - "{{ labkey_backup }}"

  # ===========================================================================
  # 3. Java — výběr JDK 17 nebo 25 podle verze LabKey
  # ===========================================================================

    - name: "Java | Detekce verze LabKey"
      set_fact:
        _labkey_version: "{{ labkey_dist_dir | regex_search('LabKey(\\d+\\.\\d+)', '\\1') | first }}"

    - name: "Java | Výběr JDK 25 (LabKey > 25.11)"
      set_fact:
        effective_jdk_archive: "{{ jdk25_archive }}"
        effective_jdk_dir:     "{{ jdk25_dir }}"
      when: _labkey_version is version('25.11', '>')

    - name: "Java | Výběr JDK 17 (LabKey ≤ 25.11)"
      set_fact:
        effective_jdk_archive: "{{ jdk_archive }}"
        effective_jdk_dir:     "{{ jdk_dir }}"
      when: not (_labkey_version is version('25.11', '>'))

    - name: "Java | Zkopírování JDK archivu na server (z files/)"
      copy:
        src: "../files/{{ effective_jdk_archive }}"
        dest: "{{ labkey_apps }}/{{ effective_jdk_archive }}"
        owner: root
        group: root
        mode: "0644"

    - name: "Java | Rozbalení JDK do {{ labkey_apps }}"
      unarchive:
        src:     "{{ labkey_apps }}/{{ effective_jdk_archive }}"
        dest:    "{{ labkey_apps }}"
        remote_src: true
        creates: "{{ labkey_apps }}/{{ effective_jdk_dir }}"

    - name: "Java | Symlink /usr/local/java → {{ labkey_apps }}/{{ effective_jdk_dir }}"
      file:
        src:   "{{ labkey_apps }}/{{ effective_jdk_dir }}"
        dest:  "/usr/local/java"
        state: link

    - name: "Java | Přidání JAVA_HOME do /etc/profile"
      blockinfile:
        path: /etc/profile
        marker: "# {mark} JAVA_HOME (LabKey)"
        block: |
          export JAVA_HOME=/usr/local/java
          export PATH=$PATH:$JAVA_HOME/bin

  # ===========================================================================
  # 4. PostgreSQL
  # ===========================================================================

    - name: "PostgreSQL | Zjištění verze PostgreSQL"
      shell: pg_lsclusters --no-header | awk '{print $1}' | head -1
      register: pg_version
      changed_when: false

    - name: "PostgreSQL | Zastavení služby před přesunem dat"
      service:
        name: postgresql
        state: stopped

    - name: "PostgreSQL | Vytvoření cílového datového adresáře"
      file:
        path: "{{ pg_data_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0700"

    - name: "PostgreSQL | Přesun datového adresáře do {{ pg_data_dir }}"
      command: >
        mv /var/lib/postgresql/{{ pg_version.stdout }}/main
           {{ pg_data_dir }}/main
      args:
        creates: "{{ pg_data_dir }}/main"

    - name: "PostgreSQL | Symlink {{ pg_version.stdout }}/main → {{ pg_data_dir }}/main"
      file:
        src: "{{ pg_data_dir }}/main"
        dest: "/var/lib/postgresql/{{ pg_version.stdout }}/main"
        state: link

    - name: "PostgreSQL | Spuštění služby"
      service:
        name: postgresql
        state: started
        enabled: true

    - name: "PostgreSQL | Zkopírování SQL skriptu pro vytvoření DB"
      template:
        src: "../templates/create_db.sql.j2"
        dest: "/tmp/create_db.sql"
        owner: postgres
        mode: "0600"

    - name: "PostgreSQL | Vytvoření uživatele a databáze"
      command: sudo -u postgres psql -f /tmp/create_db.sql
      ignore_errors: true    # ignoruje chybu pokud DB/user již existuje

    - name: "PostgreSQL | Smazání dočasného SQL souboru"
      file:
        path: /tmp/create_db.sql
        state: absent

  # ===========================================================================
  # 5. Systémový uživatel labkey
  # ===========================================================================

    - name: "Uživatel | Vytvoření systémového uživatele labkey"
      user:
        name: "{{ labkey_system_user }}"
        system: true
        create_home: true
        shell: /bin/false
        comment: "LabKey Server service account"

    - name: "Uživatel | Nastavení vlastníka {{ labkey_home }}"
      file:
        path: "{{ labkey_home }}"
        owner: "{{ labkey_system_user }}"
        group: "{{ labkey_system_user }}"
        recurse: true

  # ===========================================================================
  # 6. LabKey binaries
  # ===========================================================================

    - name: "LabKey | Zkopírování LabKey archivu na server"
      copy:
        src: "../files/{{ labkey_archive }}"
        dest: "{{ labkey_src }}/{{ labkey_archive }}"
        owner: root
        group: root
        mode: "0644"

    - name: "LabKey | Rozbalení LabKey distribuce do {{ labkey_src }}"
      unarchive:
        src: "{{ labkey_src }}/{{ labkey_archive }}"
        dest: "{{ labkey_src }}"
        remote_src: true
        creates: "{{ labkey_dist }}"

    - name: "LabKey | Zkopírování labkeyServer.jar do {{ labkey_home }}"
      copy:
        src: "{{ labkey_dist }}/labkeyServer.jar"
        dest: "{{ labkey_home }}/labkeyServer.jar"
        owner: "{{ labkey_system_user }}"
        group: "{{ labkey_system_user }}"
        mode: "0644"
        remote_src: true

    - name: "LabKey | Zkopírování výchozí konfigurace do {{ labkey_home }}/config"
      copy:
        src: "{{ labkey_dist }}/config/"
        dest: "{{ labkey_home }}/config/"
        owner: "{{ labkey_system_user }}"
        group: "{{ labkey_system_user }}"
        remote_src: true

  # ===========================================================================
  # 7. application.properties — doplnění hodnot
  # ===========================================================================

    - name: "Konfig | Nastavení DB uživatelského jména"
      replace:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '@@username@@'
        replace: "{{ labkey_db_user }}"

    - name: "Konfig | Nastavení DB hesla"
      replace:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '@@password@@'
        replace: "{{ labkey_db_pass }}"

    - name: "Konfig | Nastavení šifrovacího klíče"
      replace:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '@@encryptionKey@@'
        replace: "{{ labkey_encryption_key }}"

    - name: "Konfig | Nastavení portu LabKey ({{ labkey_port }})"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^server\.port='
        line: "server.port={{ labkey_port }}"

    - name: "Konfig | Nastavení baseServerURL"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^SiteSettings\.baseServerURL='
        line: "SiteSettings.baseServerURL={{ labkey_base_server_url }}"

    - name: "Konfig | Nastavení názvu organizace"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^LookAndFeelSettings\.companyName='
        line: "LookAndFeelSettings.companyName={{ labkey_company_name }}"
      when: labkey_company_name != ""

    - name: "Konfig | Nastavení krátkého názvu systému"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^LookAndFeelSettings\.systemShortName='
        line: "LookAndFeelSettings.systemShortName={{ labkey_system_short_name }}"
      when: labkey_system_short_name != ""

    - name: "Konfig | Nastavení systémové emailové adresy"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^LookAndFeelSettings\.systemEmailAddress='
        line: "LookAndFeelSettings.systemEmailAddress={{ labkey_system_email }}"
      when: labkey_system_email != ""

    - name: "Konfig | SMTP — host"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpHost='
        line: "mail.smtpHost={{ labkey_smtp_host }}"
      when: labkey_smtp_host != ""

    - name: "Konfig | SMTP — port"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpPort='
        line: "mail.smtpPort={{ labkey_smtp_port }}"
      when: labkey_smtp_host != ""

    - name: "Konfig | SMTP — from adresa"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpFrom='
        line: "mail.smtpFrom={{ labkey_smtp_from }}"
      when: labkey_smtp_from != ""

    - name: "Konfig | SMTP — uživatel"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpUser='
        line: "mail.smtpUser={{ labkey_smtp_user }}"
      when: labkey_smtp_user != ""

    - name: "Konfig | SMTP — heslo"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpPassword='
        line: "mail.smtpPassword={{ labkey_smtp_password }}"
      no_log: true
      when: labkey_smtp_password != ""

    - name: "Konfig | SMTP — auth"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpAuth='
        line: "mail.smtpAuth={{ labkey_smtp_auth }}"
      when: labkey_smtp_host != ""

    - name: "Konfig | SMTP — STARTTLS"
      lineinfile:
        path: "{{ labkey_home }}/config/application.properties"
        regexp: '^mail\.smtpStartTlsEnable='
        line: "mail.smtpStartTlsEnable={{ labkey_smtp_starttls }}"
      when: labkey_smtp_host != ""

  # ===========================================================================
  # 8. Systemd service
  # ===========================================================================

    - name: "Systemd | Instalace labkey_server.service"
      template:
        src: "../templates/labkey_server.service.j2"
        dest: "/etc/systemd/system/labkey_server.service"
        owner: root
        group: root
        mode: "0644"

    - name: "Systemd | daemon-reload po instalaci service souboru"
      systemd:
        daemon_reload: true

    - name: "Systemd | Povolení a spuštění labkey_server"
      service:
        name: labkey_server
        state: started
        enabled: true

  # ===========================================================================
  # 9. Upozornění po instalaci
  # ===========================================================================

    - name: "HOTOVO | Upozornění na kroky před ostrým nasazením"
      debug:
        msg:
          - "============================================================"
          - " LabKey Server byl nainstalován a spuštěn."
          - " Před ostrým nasazením je nutné:"
          - ""
          - " 1. HESLA — v group_vars/labkey_servers.yml změnit:"
          - "    - labkey_db_pass (nyní: '{{ labkey_db_pass }}')"
          - "    - labkey_encryption_key (nyní: '{{ labkey_encryption_key }}')"
          - "    Poté znovu spustit playbook (idempotentní)."
          - ""
          - " 2. FIREWALL — otevřít port 80 (nebo jiný, dle server.port)"
          - "    v application.properties"
          - ""
          - " 3. ZÁLOHOVÁNÍ — nastavit zálohy PostgreSQL a {{ labkey_home }}"
          - ""
          - " Stav služby: systemctl status labkey_server"
          - " Logy:        journalctl -u labkey_server -f"
          - "============================================================"
